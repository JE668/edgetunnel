# 文件名：.github/workflows/sync-fork.yml
# 作用：每天定时检测上游 cmliu/edgetunnel 是否有「fork 尚未包含」的新提交，
#       仅当 fork 落后于上游时才用 git merge 把上游合并进来（从而触发 Cloudflare Pages 重新部署）。
#       关键：用 merge 而非 force reset，因此本 workflow 文件本身不会被同步抹掉。
#
# 放置位置：你 fork 的 JE668/edgetunnel 仓库里 .github/workflows/sync-fork.yml

name: Sync Fork with Upstream

on:
  schedule:
    # 每天 UTC 00:00（= 北京时间 08:00）。想换时间改这里：https://crontab.guru/
    - cron: '0 0 * * *'
  workflow_dispatch: {}   # 允许在 Actions 页面手动点 “Run workflow” 立即执行一次

permissions:
  contents: write        # 需要写权限来 push 合并结果

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork（带 token，便于后续 push）
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 配置 git 并拉取上游
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/cmliu/edgetunnel.git
          git fetch upstream main

      - name: 检测 fork 是否落后上游
        id: detect
        run: |
          set -euo pipefail
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "behind=false" >> "$GITHUB_OUTPUT"
            echo "✅ fork 已包含上游全部提交，无需同步"
          else
            echo "behind=true"  >> "$GITHUB_OUTPUT"
            echo "🔔 上游有 fork 尚未包含的提交，准备合并"
          fi

      - name: 合并上游（仅当落后时执行）
        if: steps.detect.outputs.behind == 'true'
        run: |
          set -euo pipefail
          git merge upstream/main --no-edit
          git push origin main
          echo "✅ 已合并上游更新，Cloudflare Pages 将自动重新部署"
